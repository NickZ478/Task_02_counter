<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой счетчик</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>СЧЕТЧИК</h1>
        
        <div class="number" id="result">0</div>
        
        <div class="buttons">
            <button class="btn-minus" id="minus">−</button>
            <button class="btn-plus" id="plus">+</button>
        </div>
        
        <div class="message" id="msg">Нажми на кнопки</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
